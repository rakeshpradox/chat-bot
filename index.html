<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARADOX MULTI-AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a, #020617);
        }
        pre, code {
            font-family: 'JetBrains Mono', monospace !important;
            font-size: 0.9rem;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .dot {
            animation: wave 1.3s linear infinite;
        }
        .dot:nth-child(2) { animation-delay: -1.1s; }
        .dot:nth-child(3) { animation-delay: -0.9s; }
        @keyframes wave {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="text-slate-200 h-screen flex flex-col overflow-hidden">

    <header class="glass-panel z-10 px-4 py-3 flex items-center justify-between shadow-xl flex-shrink-0">
        <div class="flex items-center gap-2">
            <div class="h-8 w-8 rounded-lg bg-gradient-to-tr from-violet-600 to-indigo-500 flex items-center justify-center shadow-lg shadow-indigo-500/30 flex-shrink-0">
                <span class="text-base">🌀</span>
            </div>
            <div class="hidden sm:block">
                <h1 class="text-sm font-bold tracking-tight bg-gradient-to-r from-violet-200 to-indigo-200 bg-clip-text text-transparent">PARADOX AI</h1>
            </div>
        </div>

        <div class="flex items-center gap-1.5 sm:gap-2">
            <select id="ai-provider" onchange="handleProviderChange()" 
                    class="bg-slate-900 border border-slate-800 text-xs rounded-lg py-1.5 px-2 text-slate-300 focus:outline-none focus:border-violet-500 cursor-pointer flex-shrink-0">
                <option value="gemini">Google Gemini</option>
                <option value="openai">OpenAI ChatGPT</option>
                <option value="anthropic">Claude Anthropic</option>
            </select>

            <a id="get-key-link" href="https://aistudio.google.com/app/apikey" 
               target="_blank" 
               rel="noopener noreferrer" 
               class="flex items-center gap-1 text-xs font-semibold text-violet-400 hover:text-violet-300 bg-violet-950/40 border border-violet-800/60 px-2.5 py-1.5 rounded-lg hover:bg-violet-950/60 flex-shrink-0">
                <span>🔑</span>
                <span class="hidden md:inline">Get Key</span>
            </a>

            <div class="relative w-32 sm:w-48 md:w-56">
                <input type="password" id="api-key-input" 
                       class="w-full bg-slate-950/60 border border-slate-800 rounded-lg py-1.5 pl-3 pr-8 text-xs text-slate-300 placeholder-slate-500 focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 transition-all duration-200" 
                       placeholder="Enter Gemini Key..." />
                <span class="absolute right-2.5 top-2 text-slate-500 text-xs pointer-events-none" id="key-status-icon">🔒</span>
            </div>
            
            <button onclick="saveApiKey()" 
                    class="bg-gradient-to-r from-violet-600 to-indigo-600 hover:from-violet-500 hover:to-indigo-500 text-white text-xs font-semibold px-3 py-1.5 rounded-lg shadow-md transition-all duration-200 flex-shrink-0">
                Save
            </button>
        </div>
    </header>

    <main id="chat-container" class="flex-1 overflow-y-auto px-4 py-6 md:px-12 space-y-6 max-w-4xl w-full mx-auto">
        <div id="welcome-message" class="flex flex-col items-center justify-center h-full text-center p-8 animate-fade-in">
            <div class="h-14 w-14 rounded-2xl bg-slate-900/80 border border-slate-800 flex items-center justify-center text-2xl mb-4 shadow-inner">
                🌀
            </div>
            <h2 class="text-lg font-bold text-slate-100 mb-1">Welcome to PARADOX AI Hub</h2>
            <p class="text-xs text-slate-400 max-w-sm mb-4 leading-relaxed">
                Select your favorite provider, save your personal API key above, and enjoy instant secure access.
            </p>
            <div class="flex gap-2 justify-center flex-wrap">
                <span class="text-[10px] bg-slate-900 border border-slate-800 text-slate-400 px-2.5 py-1 rounded-full">🟢 Gemini 2.0 Flash</span>
                <span class="text-[10px] bg-slate-900 border border-slate-800 text-slate-400 px-2.5 py-1 rounded-full">🔵 GPT-4o Mini</span>
                <span class="text-[10px] bg-slate-900 border border-slate-800 text-slate-400 px-2.5 py-1 rounded-full">🟠 Claude 3.5 Sonnet</span>
            </div>
        </div>
    </main>

    <footer class="p-4 bg-gradient-to-t from-slate-950 via-slate-950/90 to-transparent flex-shrink-0">
        <div class="max-w-4xl w-full mx-auto">
            <div class="glass-panel rounded-2xl p-1.5 shadow-2xl flex items-end gap-2 focus-within:border-violet-500/50 transition-colors duration-200">
                <textarea id="user-input" 
                          rows="1"
                          oninput="autoResize(this)"
                          onkeydown="handleKeyPress(event)"
                          placeholder="Ask anything..." 
                          class="flex-1 max-h-32 min-h-[40px] bg-transparent resize-none border-0 text-slate-200 placeholder-slate-400 focus:ring-0 focus:outline-none p-2.5 text-sm leading-relaxed"></textarea>
                
                <button onclick="sendMessage()" 
                        class="bg-violet-600 hover:bg-violet-500 text-white h-10 w-10 flex items-center justify-center rounded-xl shadow-lg transition-all duration-200 flex-shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4.5 h-4.5 transform rotate-45 -translate-x-[0.5px] translate-y-[0.5px]">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
                    </svg>
                </button>
            </div>
        </div>
    </footer>

    <script>
        // URLs config mapping for generating keys
        const providerLinks = {
            gemini: "https://aistudio.google.com/app/apikey",
            openai: "https://platform.openai.com/api-keys",
            anthropic: "https://console.anthropic.com/settings/keys"
        };

        document.addEventListener('DOMContentLoaded', () => {
            handleProviderChange(true); // Load key for default provider on opening
        });

        function handleProviderChange(isInitialLoad = false) {
            const provider = document.getElementById('ai-provider').value;
            const keyInput = document.getElementById('api-key-input');
            const linkButton = document.getElementById('get-key-link');
            
            // Adjust the Get Key Link destination
            linkButton.href = providerLinks[provider];
            keyInput.placeholder = `Enter ${provider.charAt(0).toUpperCase() + provider.slice(1)} Key...`;

            // Load saved key for specific provider
            const savedKey = localStorage.getItem(`api_key_${provider}`);
            if (savedKey) {
                keyInput.value = savedKey;
                updateKeyStatusUI(true);
            } else {
                keyInput.value = '';
                updateKeyStatusUI(false);
            }
        }

        function updateKeyStatusUI(hasKey) {
            const icon = document.getElementById('key-status-icon');
            icon.textContent = hasKey ? "🟢" : "🔒";
        }

        function saveApiKey() {
            const provider = document.getElementById('ai-provider').value;
            const key = document.getElementById('api-key-input').value.trim();
            
            if (key) {
                localStorage.setItem(`api_key_${provider}`, key);
                updateKeyStatusUI(true);
                showToast(`${provider.toUpperCase()} Key Linked!`);
            } else {
                localStorage.removeItem(`api_key_${provider}`);
                updateKeyStatusUI(false);
                showToast("Key removed.");
            }
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = "fixed bottom-20 right-6 bg-slate-900 border border-slate-700 text-slate-200 text-xs py-2.5 px-4 rounded-xl shadow-2xl z-50 animate-fade-in";
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function appendMessage(htmlContent, sender, isRaw = false) {
            const container = document.getElementById('chat-container');
            const welcome = document.getElementById('welcome-message');
            if (welcome) welcome.remove();

            const wrapper = document.createElement('div');
            wrapper.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} animate-fade-in w-full`;

            const bubble = document.createElement('div');
            bubble.className = sender === 'user' 
                ? 'max-w-[85%] bg-gradient-to-tr from-violet-600 to-indigo-600 text-white py-2.5 px-4 rounded-2xl rounded-tr-sm shadow-md text-sm leading-relaxed' 
                : 'max-w-[85%] bg-slate-900/90 border border-slate-800 text-slate-200 py-2.5 px-4 rounded-2xl rounded-tl-sm shadow-md text-sm leading-relaxed prose prose-invert';

            if (isRaw) {
                bubble.innerHTML = htmlContent;
            } else {
                bubble.textContent = htmlContent;
            }

            wrapper.appendChild(bubble);
            container.appendChild(wrapper);
            container.scrollTop = container.scrollHeight;
            return bubble;
        }

        function typeText(element, rawMarkdown) {
            const parsedHtml = marked.parse(rawMarkdown);
            element.innerHTML = parsedHtml;
            const container = document.getElementById('chat-container');
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const userMessage = inputField.value.trim();
            const provider = document.getElementById('ai-provider').value;
            const apiKey = document.getElementById('api-key-input').value.trim() || localStorage.getItem(`api_key_${provider}`);

            if (!userMessage) return;

            if (!apiKey) {
                showToast("🔑 Please save an API key for this provider first.");
                return;
            }

            appendMessage(userMessage, 'user');
            inputField.value = '';
            inputField.style.height = 'auto';

            const loadingBubble = appendMessage(`
                <div class="flex items-center gap-1 py-1 px-2">
                    <div class="dot w-2 h-2 bg-slate-400 rounded-full"></div>
                    <div class="dot w-2 h-2 bg-slate-400 rounded-full"></div>
                    <div class="dot w-2 h-2 bg-slate-400 rounded-full"></div>
                </div>
            `, 'ai', true);

            try {
                let response, data, replyText;

                // 🌐 DYNAMIC ROUTING SYSTEM
                if (provider === 'gemini') {
                    response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: userMessage }] }] })
                    });
                    data = await response.json();
                    if (response.ok) replyText = data.candidates[0].content.parts[0].text;
                    else throw new Error(data.error.message || "Gemini Error");

                } else if (provider === 'openai') {
                    response = await fetch('https://api.openai.com/v1/chat/completions', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                        body: JSON.stringify({ model: 'gpt-4o-mini', messages: [{ role: 'user', content: userMessage }] })
                    });
                    data = await response.json();
                    if (response.ok) replyText = data.choices[0].message.content;
                    else throw new Error(data.error.message || "OpenAI Error");

                } else if (provider === 'anthropic') {
                    // Client-side Anthropic requires bypassing strict CORS configurations for local mock testing
                    response = await fetch('https://api.anthropic.com/v1/messages', {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json', 
                            'x-api-key': apiKey,
                            'anthropic-version': '2023-06-01',
                            'anthropic-dangerously-allow-browser': 'true'
                        },
                        body: JSON.stringify({ model: 'claude-3-5-sonnet-20241022', max_tokens: 1024, messages: [{ role: 'user', content: userMessage }] })
                    });
                    data = await response.json();
                    if (response.ok) replyText = data.content[0].text;
                    else throw new Error(data.error.message || "Anthropic Error");
                }

                typeText(loadingBubble, replyText);

            } catch (error) {
                console.error(error);
                loadingBubble.innerHTML = `<span class="text-rose-400 font-semibold">API Error:</span> ${error.message || "Failed to fetch response."}`;
            }
        }
    </script>
</body>
</html>
